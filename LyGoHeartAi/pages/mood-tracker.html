<!DOCTYPE html>
<html>

<head>

<title>LyGoHeart AI Mood Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

.moods{

display:flex;
justify-content:space-between;
gap:10px;
margin:20px 0;

}


.mood{

background:white;
border-radius:20px;
padding:15px;
font-size:30px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

}


.mood:hover{

transform:scale(1.1);
transition:0.3s;

}


textarea{

width:100%;
height:100px;
border-radius:20px;
border:1px solid #ccc;
padding:15px;
font-size:15px;
resize:none;

}


.result{

background:white;
padding:20px;
border-radius:20px;
margin-top:20px;

}

</style>


</head>


<body>



<div class="container">



<div class="logo">

<i class="fa-solid fa-heart-pulse"></i>

</div>



<h1>Mood Tracker</h1>


<p>
How are you feeling today? 💚
</p>




<div class="moods">


<div class="mood" onclick="selectMood('Happy 😊')">
😊
</div>


<div class="mood" onclick="selectMood('Sad 😔')">
😔
</div>


<div class="mood" onclick="selectMood('Angry 😡')">
😡
</div>


<div class="mood" onclick="selectMood('Stress 😰')">
😰
</div>


</div>




<textarea 
id="feeling"
placeholder="Andika unavyojisikia leo..."
></textarea>




<button onclick="saveMood()">

<i class="fa-solid fa-check"></i>

Save Mood

</button>




<div class="result" id="result">

Bado hujaweka mood yako leo ❤️

</div>




</div>






<!-- Bottom Navigation -->

<div class="bottom-nav">


<a href="../index.html">

<i class="fa-solid fa-house"></i>

Home

</a>



<a href="ai-chat.html">

<i class="fa-solid fa-brain"></i>

AI

</a>



<a href="mood-tracker.html">

<i class="fa-solid fa-heart-pulse"></i>

Mood

</a>



<a href="profile.html">

<i class="fa-solid fa-user"></i>

Profile

</a>



</div>







<script>


let selectedMood="";



function selectMood(mood){


selectedMood=mood;


document.getElementById("result").innerHTML=

"Umechagua: "+mood;


}




function saveMood(){


let feeling=document.getElementById("feeling").value;



if(selectedMood==""){

alert("Chagua mood kwanza");

return;

}



localStorage.setItem(

"mood",

selectedMood+" - "+feeling

);



document.getElementById("result").innerHTML=

"Saved ❤️<br>"+selectedMood+"<br>"+feeling;



}



</script>



</body>

</html>
