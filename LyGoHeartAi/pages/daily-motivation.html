<!DOCTYPE html>
<html>

<head>

<title>Daily Motivation - LyGoHeart AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

.quote-box{

background:white;
padding:30px;
border-radius:25px;
margin:30px 0;
box-shadow:0 5px 20px rgba(0,0,0,0.1);

}


.quote-box i{

font-size:45px;
color:#064126;

}


#quote{

font-size:18px;
line-height:1.6;

}


.date{

color:#064126;
font-weight:bold;

}


</style>

</head>



<body>



<div class="container">



<div class="logo">

<i class="fa-solid fa-star"></i>

</div>



<h1>Daily Motivation</h1>


<p>
Positive energy for your heart ❤️
</p>





<div class="quote-box">


<i class="fa-solid fa-quote-left"></i>


<p id="quote">
Loading...
</p>


<p class="date" id="date"></p>


</div>





<button onclick="saveQuote()">

<i class="fa-solid fa-heart"></i>

Save Motivation

</button>





<div class="quote-box" id="saved">

No saved motivation yet ⭐

</div>




</div>







<!-- Bottom Navigation -->


<div class="bottom-nav">


<a href="../index.html">

<i class="fa-solid fa-house"></i>

Home

</a>



<a href="ai-chat.html">

<i class="fa-solid fa-brain"></i>

AI

</a>



<a href="mood-tracker.html">

<i class="fa-solid fa-heart-pulse"></i>

Mood

</a>



<a href="profile.html">

<i class="fa-solid fa-user"></i>

Profile

</a>


</div>







<script>


let motivations=[


"Unastahili upendo wenye heshima, amani na furaha ❤️",

"Jipende kwanza kabla ya kutafuta upendo wa wengine 🌱",

"Mahusiano bora hujengwa kwa mawasiliano na uaminifu 🤝",

"Linda amani ya moyo wako, upendo mzuri haukupi hofu 💚",

"Kila changamoto ni nafasi ya kujifunza na kukua ✨",

"Leo ni siku mpya ya kujenga upendo bora 🌟"

];



function loadMotivation(){


let today=new Date();


let index=today.getDate() % motivations.length;



document.getElementById("quote").innerHTML =
motivations[index];


document.getElementById("date").innerHTML =
"Today's Motivation • "+today.toDateString();


}



function saveQuote(){


let quote=document.getElementById("quote").innerHTML;


localStorage.setItem(
"favoriteMotivation",
quote
);



document.getElementById("saved").innerHTML=

"⭐ Saved:<br><br>"+quote;


}



loadMotivation();


</script>



</body>
