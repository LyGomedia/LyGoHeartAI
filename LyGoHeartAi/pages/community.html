<!DOCTYPE html>
<html>

<head>

<title>Community - LyGoHeart AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

.post-box{

background:white;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin:20px 0;

}


textarea{

width:100%;
height:100px;
padding:15px;
border-radius:20px;
border:1px solid #ccc;
resize:none;

}


.post{

background:#e8f3ed;
padding:15px;
border-radius:20px;
margin:15px 0;
text-align:left;

}


.post i{

color:#064126;

}


</style>

</head>



<body>


<div class="container">



<div class="logo">

<i class="fa-solid fa-users"></i>

</div>



<h1>Community</h1>


<p>
Share, support and grow together 💚
</p>




<div class="post-box">


<textarea 
id="postText"
placeholder="Andika changamoto yako ya mahusiano..."
></textarea>



<button onclick="addPost()">

<i class="fa-solid fa-paper-plane"></i>

Share

</button>


</div>





<div id="posts">


<div class="post">

<i class="fa-solid fa-user"></i>

<strong>Anonymous</strong>

<br><br>

"Ninajifunza jinsi ya kuwasiliana vizuri na mwenza wangu ❤️"

</div>


</div>





</div>





<!-- Bottom Navigation -->


<div class="bottom-nav">


<a href="../index.html">

<i class="fa-solid fa-house"></i>

Home

</a>



<a href="ai-chat.html">

<i class="fa-solid fa-brain"></i>

AI

</a>



<a href="community.html">

<i class="fa-solid fa-users"></i>

Community

</a>



<a href="profile.html">

<i class="fa-solid fa-user"></i>

Profile

</a>



</div>






<script>


function addPost(){


let text=document.getElementById("postText").value;


if(text==""){

return;

}


let posts=document.getElementById("posts");



posts.innerHTML +=

`

<div class="post">

<i class="fa-solid fa-user"></i>

<strong>Anonymous</strong>

<br><br>

${text}

</div>

`;



document.getElementById("postText").value="";


}



</script>



</body>

</html>
